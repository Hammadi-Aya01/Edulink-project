<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un Événement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f6fa;
      color: #2c3e50;
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 8px;
      margin-top: 15px;
      font-weight: bold;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background-color: #2c3e50;
      color: white;
      padding: 10px 20px;
      margin-top: 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #34495e;
    }
  </style>
</head>
<body>

  <h2><i class="fas fa-calendar-plus"></i> Créer un Événement</h2>

  <form action="ajouter_event.php" method="POST">
    <label for="lieu">Lieu :</label>
    <input type="text" id="lieu" name="lieu" required>

    <label for="date">Date :</label>
    <input type="date" id="date" name="date" required>

    <label for="activite">Activité :</label>
    <input type="text" id="activite" name="activite" required>

    <label for="description">Description :</label>
    <textarea id="description" name="description" rows="3" required></textarea>

    <label for="etudiant">ID Étudiant :</label>
    <input type="number" id="etudiant" name="etudiant" required>

    <label for="entreprise">ID Entreprise :</label>
    <input type="number" id="entreprise" name="entreprise" required>

    <button type="submit">Enregistrer l'Événement</button>
  </form>

</body>
</html>
