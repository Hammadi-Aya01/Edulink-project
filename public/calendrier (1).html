<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier des Événements</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f6fa;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }


    #calendar {
      max-width: 900px;
      margin: auto;
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .upcoming-events {
      max-width: 900px;
      margin: 40px auto 0;
      background-color: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .upcoming-events h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .event-item {
      margin-bottom: 10px;
    }

    .event-item strong {
      color: #34495e;
    }

    .event-item span {
      color: #7f8c8d;
    }
    #calendar{
      margin-top: 3%;
    }
     
  </style>
    
</head>
<body>

 <header>
  <h1>📅 Calendrier des Événements</h1>
</header>

  <div id="calendar">
      <iframe src="https://calendar.google.com/calendar/embed?src=yourcalendar%40gmail.com&ctz=Europe%2FParis"
              frameborder="0"
              width="100%"
              height="400"
              style="border:0;"></iframe>
  </div>

  <div class="upcoming-events">
    <h2>📌 Événements à venir</h2>
    <div class="event-item">
      <strong>Présentation PFA</strong> – <span>22 avril 2025</span>
    </div>
    <div class="event-item">
      <strong>Remise de rapport PFE</strong> – <span>27 avril 2025</span>
    </div>
    <div class="event-item">
      <strong>Exam Réseaux</strong> – <span>3 mai 2025</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');
      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'fr',
        height: 'auto',
        events: [
          {
            title: 'Présentation PFA',
            date: '2025-04-22',
            color: '#27ae60'
          },
          {
            title: 'Remise rapport PFE',
            date: '2025-04-27',
            color: '#e67e22'
          },
          {
            title: 'Exam Réseaux',
            date: '2025-05-03',
            color: '#c0392b'
          }
        ]
      });
      calendar.render();
    });
  </script>
</body>
</html>
