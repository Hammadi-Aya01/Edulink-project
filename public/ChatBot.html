<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Chatbot Violet</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #a18cd1, #fbc2eb);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .chat-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 320px;
        background-color: #ffffffee;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        transition: all 0.3s ease-in-out;
      }

      .chat-header {
        background-color: #6a0dad;
        color: white;
        padding: 12px 16px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chat-header h2 {
        font-size: 16px;
        margin: 0;
      }

      .chat-body {
        display: block;
        padding: 15px;
      }

      #chatbox {
        height: 200px;
        border: 1px solid #ddd;
        padding: 10px;
        overflow-y: auto;
        background: #faf5ff;
        font-size: 14px;
        margin-bottom: 10px;
        border-radius: 8px;
      }

      .bot {
        color: #6a0dad;
        margin: 6px 0;
      }

      .user {
        color: #9c27b0;
        margin: 6px 0;
      }

      .input-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      input[type="text"] {
        width: calc(100% - 80px);
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        background-color: #f3e5f5;
        color: #333;
      }

      button {
        padding: 10px 14px;
        background-color: #9c27b0;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin-left: 10px;
      }

      button:hover {
        background-color: #7b1fa2;
      }

      .hidden {
        display: none;
      }

      .toggle-btn {
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header" onclick="toggleChat()">
        <h2>💬 Chatbot</h2>
        <button class="toggle-btn" id="toggleIcon">−</button>
      </div>
      <div class="chat-body" id="chatBody">
        <div id="chatbox"></div>
        <div class="input-container">
          <input type="text" id="userInput" placeholder="Écris un message..." />
          <button onclick="sendMessage()">Envoyer</button>
        </div>
      </div>
    </div>

    <script>
      const chatbox = document.getElementById("chatbox");
      const chatBody = document.getElementById("chatBody");
      const toggleIcon = document.getElementById("toggleIcon");

      function addMessage(sender, message) {
        const msg = `<div class="${sender}"><strong>${
          sender === "user" ? "Vous" : "Bot"
        }:</strong> ${message}</div>`;
        chatbox.innerHTML += msg;
        chatbox.scrollTop = chatbox.scrollHeight;
      }

      function getBotResponse(input) {
        input = input.toLowerCase();
        if (
          input.includes("bonjour") ||
          input.includes("salut") ||
          input.includes("hi") ||
          input.includes("salem") ||
          input.includes("coucou") ||
          input.includes("slm" || input.includes("cc"))
        )
          return "Bonjour ! Comment puis-je t'aider ?";
        if (input.includes("comment ça va") || input.includes("how are you"))
          return "Je vais bien, merci ! Et toi ?";
        if (
          input.includes("j'ai un question") ||
          input.includes("3andi sou2el") ||
          input.includes("aide") ||
          input.includes("aider")
        )
          return "Je suis là pour t'aider, dis-moi ce que tu veux savoir ou bien Vous pouvez nous contacter par téléphone au +216 12 345 67 ou par email à contact@exemple.com.";
        if (
          input.includes("merci") ||
          input.includes("thanks") ||
          input.includes("thank you") ||
          input.includes("y3ychk")
        )
          return "Avec plaisir !";
        return "Désolé, je n'ai pas compris. Peux-tu reformuler ?";
      }

      function sendMessage() {
        const input = document.getElementById("userInput").value;
        if (input.trim() === "") return;
        addMessage("user", input);
        const response = getBotResponse(input);
        addMessage("bot", response);
        document.getElementById("userInput").value = "";
      }

      document
        .getElementById("userInput")
        .addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            sendMessage();
          }
        });

      function toggleChat() {
        if (chatBody.classList.contains("hidden")) {
          chatBody.classList.remove("hidden");
          toggleIcon.textContent = "−";
        } else {
          chatBody.classList.add("hidden");
          toggleIcon.textContent = "+";
        }
      }
    </script>
  </body>
</html>
