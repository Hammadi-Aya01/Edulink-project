<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PFE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 40px;
    }

    h2 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #2c3e50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #34495e;
    }

    .project {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .project h4 {
      margin-bottom: 5px;
      color: #34495e;
    }

    .project p {
      margin: 0;
      color: #555;
    }
  </style>
</head>
<body>

  <header>
    <h1>📁 Projets PFE</h1>
  </header>

  <div class="container">

    <!-- Formulaire d'ajout -->
    <div class="section">
      <h2>➕ Ajouter un projet PFE</h2>
      <form id="pfaForm">
        <input type="text" id="titrePfa" placeholder="Titre du projet" required>
        <textarea id="descPfa" placeholder="Description du projet" rows="4" required></textarea>
        <input type="file" id="fichierPfa" required>
        <button type="submit">Ajouter</button>
      </form>
    </div>

    <!-- Liste des projets -->
    <div class="section">
      <h2>📃 Liste des PFE</h2>
      <div id="pfaList">
        <div class="project">
          <h4>Exemple de projet PFE</h4>
          <p>Développement d'une application web éducative.</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById("pfaForm");
    const list = document.getElementById("pfaList");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const titre = document.getElementById("titrePfa").value;
      const desc = document.getElementById("descPfa").value;

      const project = document.createElement("div");
      project.className = "project";
      project.innerHTML = `<h4>${titre}</h4><p>${desc}</p>`;
      list.prepend(project);

      form.reset();
    });
  </script>

</body>
</html>
