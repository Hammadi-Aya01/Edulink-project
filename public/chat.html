<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat Étudiant-Enseignant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ecf0f1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    .chat-container {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      gap: 10px;
    }
    .message {
  max-width: 70%;
  padding: 12px;
  border-radius: 50px; 
  font-size: 16px;
  line-height: 1.5;
  position: relative;
  transition: all 0.3s ease;
  margin-bottom: 10px; 
}

.student {
  align-self: flex-end;
  background-color: #3498db;
  color: white;
  border-top-left-radius: 50px;
  border-bottom-left-radius: 50px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
}

.teacher {
  align-self: flex-start;
  background-color: #95a5a6;
  color: white;
  border-top-right-radius: 50px;
  border-bottom-right-radius: 50px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
}

    .input-container {
      display: flex;
      padding: 10px;
      background-color: #bdc3c7;
      position: sticky;
      bottom: 0;
      gap: 10px;
    }
    .input-container input {
      flex: 1;
      padding: 12px 15px;
      border-radius: 30px;
      border: 1px solid #ccc;
      font-size: 16px;
      background-color: white;
      transition: all 0.3s ease;
    }
    .input-container input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 5px rgba(52, 152, 219, 0.7);
    }
    .input-container button {
      padding: 12px 20px;
      background-color: #2c3e50;
      color: white;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }
    .input-container button:hover {
      background-color: #3498db;
    }

    /* New additions */
    .message img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* Notifications */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      border-radius: 5px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
      display: none;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    .notification.show {
      display: block;
    }
  </style>
</head>
<body>

  <header>
    Chat Étudiant - Enseignant
  </header>

  <div class="chat-container" id="chatBox">
    <div class="message teacher">Bonjour, comment puis-je vous aider ?</div>
  </div>

  <div class="input-container">
    <input type="text" id="messageInput" placeholder="Écrire un message...">
    <button onclick="sendMessage()">Envoyer</button>
  </div>

  <!-- Notification element -->
  <div id="notification" class="notification">Vous avez une nouvelle réponse de l'enseignant !</div>

  <script>
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (text !== '') {
        // Add student message to chat
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message student';
        messageDiv.innerText = text;
        document.getElementById('chatBox').appendChild(messageDiv);
        
        // Auto response from teacher
        setTimeout(() => {
          const teacherMessageDiv = document.createElement('div');
          teacherMessageDiv.className = 'message teacher';
          teacherMessageDiv.innerText = 'Je suis là pour vous aider, vous pouvez poser votre question.';
          document.getElementById('chatBox').appendChild(teacherMessageDiv);
          
          // Show notification for the teacher response
          showNotification();
        }, 2000);

        input.value = '';
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
      }
    }

    function showNotification() {
      const notification = document.getElementById('notification');
      notification.classList.add('show');
      setTimeout(() => {
        notification.classList.remove('show');
      }, 4000); // Hide after 4 seconds
    }
  </script>

</body>
</html>
